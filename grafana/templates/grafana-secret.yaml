apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: gitlab-secret-store
  refreshInterval: "1m"
  target:
    creationPolicy: Owner
    deletionPolicy: "Retain"
  data:
    - secretKey: username # Key given to the secret to be created on the cluster
      remoteRef: 
        key: GRAFANA_USER # Key of the variable on Gitlab
    - secretKey: password # Key given to the secret to be created on the cluster
      remoteRef: 
        key: GRAFANA_PASSWORD # Key of the variable on Gitlab

apiVersion: installation.mattermost.com/v1beta1
kind: Mattermost
metadata:
  name: mattermost-berlin-united        # Example: mm-example-full
spec:
  image: mattermost/mattermost-team-edition
  version: 11.6.1
  size: 50users               # Example: 5000users
  replicas: 1

  database:
    external:
      secret: mattermost-postgresql

  ingress:
    enabled: true
    host: mattermost.berlin-united.com       # Example: example.mattermost-example.com
    annotations:
      kubernetes.io/ingress.class: nginx
    tlsSecret: tls-cert-mattermost
  
   
  fileStore:
    external:
      url: "minio.minio:9000" # Use the internal K8s DNS
      bucket: "mattermost"                     # Ensure this bucket exists in MinIO
      secret: mattermost-minio

  mattermostEnv:
    # Disables the "Create Account" button on the login page
    - name: MM_TEAMSETTINGS_ENABLEACCOUNTCREATION
      value: "false"
    # Prevents people from joining via an open link without an invite
    - name: MM_TEAMSETTINGS_ENABLEOPENSERVER
      value: "false"
    # This specifically tells the S3 client to stop using HTTPS
    - name: MM_FILESETTINGS_AMAZONS3SSL
      value: "false"
    #
    - name: MM_SERVICESETTINGS_ENABLELOCALMODE
      values: "true"
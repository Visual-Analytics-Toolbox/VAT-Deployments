apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailman-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailman-core
  template:
    metadata:
      labels:
        app: mailman-core
    spec:
      containers:
      - name: mailman-core
        image: maxking/mailman-core:rolling
        env:
        - name: DATABASE_TYPE
          value: "postgres"
        - name: DATABASE_CLASS
          value: "mailman.database.postgresql.PostgreSQLDatabase"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: "DATABASE_URL"
        - name: HYPERKITTY_API_KEY
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: "HYPERKITTY_API_KEY"
        - name: HYPERKITTY_URL
          value: http://mailman-web:80//hyperkitty/
        - name: SMTP_HOST
          value: "mail.berlin-united.com"
        - name: SMTP_PORT
          value: "587"  # Or 25 if you are staying internal and don't require STARTTLS
        - name: SMTP_HOST_USER
          value: "stella@berlin-united.com" # A valid account on your DMS
        - name: SMTP_HOST_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: "SMTP_HOST_PASSWORD"
        - name: MTA
          value: "postfix"
        - name: SMTP_SECURE_MODE
          value: "starttls"
        ports:
        - containerPort: 8001
          name: api
        - containerPort: 8024
          name: lmtp
        volumeMounts:
        - name: core-data
          mountPath: /opt/mailman/
      volumes:
      - name: core-data
        persistentVolumeClaim:
          claimName: mailman-core-pvc
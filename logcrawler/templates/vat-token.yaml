apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vat-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: gitlab-secret-store
  refreshInterval: "1m"
  target:
    creationPolicy: Owner
    deletionPolicy: "Retain"
  data:
    - secretKey: password
      remoteRef: 
        key: VAT_API_Token

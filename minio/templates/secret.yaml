{{- if not .Values.is_dev }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: gitlab-secret-store
  refreshInterval: "1m"
  target:
    creationPolicy: Owner
    deletionPolicy: "Retain"
  data:
    - secretKey: rootPassword # Key given to the secret to be created on the cluster
      remoteRef: 
        key: MINIO_ROOT_PASSWORD # Key of the variable on Gitlab
    - secretKey: rootUser # Key given to the secret to be created on the cluster
      remoteRef: 
        key: MINIO_ROOT_USER # Key of the variable on Gitlab
{{ else }}
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: minio-secret
data:
  rootUser: biBuYW90aAo=
  rootPassword: biBIQWsxMjM4NzY4YWRza2dsYXFBdnlkUUEK
{{ end }}


